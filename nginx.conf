server {
    listen 80;
    server_name crmprodisparo.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name crmprodisparo.duckdns.org;

    ssl_certificate     /etc/ssl/crmprodisparo/fullchain.pem;
    ssl_certificate_key /etc/ssl/crmprodisparo/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /webhook/ { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location ~ ^/(auth|leads|settings|whatsapp|kanban|google|dashboard|sellers|participantes|meetings|conversations|message-templates|send|upload|import) { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    location / { try_files $uri $uri/ /index.html; }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
